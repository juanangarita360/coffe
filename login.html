<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffe - Bienvenido de vuelta</title>
    <link rel="stylesheet" href="./css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <nav>
            <div class="logo">☕ Coffe</div>
            <ul>
                <li><a href="./index.html">Home</a></li>
                <li><a href="./menu.html">Menu</a></li>
                <li><a href="./galeria.html">Galeria</a></li>
                <li><a href="./contacto.html">Contactenos</a></li>
                <li><a href="./carrito.html"><i class="fa-solid fa-bag-shopping"></i></a></li>
                <li><a href="./login.html" class="active"><i class="fa-regular fa-circle-user"></i></a></li>
            </ul>
        </nav>
    </header>

    <main class="auth-container">
        <div class="form-box">
            <h1>Bienvenido de vuelta</h1>
            <i class="fa-solid fa-circle-user user-icon"></i>
            
            <form action="#">
                <div class="form-group">
                    <label>Correo electronico</label>
                    <input type="email" required>
                </div>
                
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" required>
                </div>
                
                <div class="form-extras">
                    <label>
                        <input type="checkbox"> Recordarme
                    </label>
                    <a href="#">¿Oluidaste la contraseña?</a>
                </div>
                
                <button type="submit" class="btn-submit">Iniciar sesion</button>
            </form>
            
            <div class="separator">Continua con</div>
            
            <div class="social-buttons">
                <button class="social-btn google">
                    <i class="fa-brands fa-google"></i> Google
                </button>
                <button class="social-btn facebook">
                    <i class="fa-brands fa-facebook-f"></i> Facebook
                </button>
            </div>
            
            <p>¿No tienes una cuenta? <a href="./registro.html">Registrate aquí</a></p>
            
            <div class="form-footer">
                <i class="fa-solid fa-lock"></i>
                <p>Tus datos estan protegidos con encriptacion niuel empresarial</p>
            </div>
        </div>

        <div class="splash-box">
            <span class="cursive-text">El mejor cafe ☕</span>
            <img src="./img/coffee-hero-section.png" alt="Taza de café con granos volando">
        </div>
    </main>

</body>
</html>
