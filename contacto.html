<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffe - Contacto</title>
    <link rel="stylesheet" href="./css/contacto.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <nav>
            <div class="logo">☕ Coffe</div>
            <ul>
                <li><a href="./index.html">Home</a></li>
                <li><a href="./menu.html">Menu</a></li>
                <li><a href="./galeria.html">Galeria</a></li>
                <li><a href="./contacto.html" class="active">Contactenos</a></li>
                <li><a href="./carrito.html"><i class="fa-solid fa-bag-shopping"></i></a></li>
                <li><a href="./login.html"><i class="fa-regular fa-circle-user"></i></a></li>
            </ul>
        </nav>
    </header>

    <main class="contact-container">
        <div class="contact-header">
            <h2>CONTACTENOS</h2>
            <div class="underline"></div>
        </div>

        <div class="contact-content">
            <div class="info-box">
                <div class="info-item">
                    <i class="fa-solid fa-map-location-dot"></i>
                    <p>123 Camsite avenue, wil, CA 51425</p>
                </div>
                <div class="info-item">
                    <i class="fa-solid fa-envelope"></i>
                    <p>info@coffeshopwebsite.com</p>
                </div>
                <div class="info-item">
                    <i class="fa-solid fa-phone"></i>
                    <p>(123) 4434-4221</p>
                </div>
                <div class="info-item">
                    <i class="fa-solid fa-clock"></i>
                    <p>Monday - friday : 9:00 AM 5:00 PM</p>
                </div>
                <div class="info-item">
                    <i class="fa-solid fa-clock"></i>
                    <p>Saturday : 10:00 AM 3:00 PM</p>
                </div>
                <div class="info-item">
                    <i class="fa-solid fa-clock"></i>
                    <p>Sunday : closed</p>
                </div>
                <div class="info-item">
                    <i class="fa-solid fa-globe"></i>
                    <p>www.coffeshopweb.com</p>
                </div>
            </div>

            <form class="contact-form">
                <input type="text" placeholder="YOUR NAME">
                <input type="email" placeholder="YOUR GMAIL">
                <textarea placeholder="YOUR MENSSAGE" rows="6"></textarea>
                <button type="submit" class="btn-submit">Enviar</button>
            </form>
        </div>

        <div class="contact-footer">
            <span class="cursive-text">El mejor cafe ☕</span>
        </div>
    </main>

</body>
</html>
